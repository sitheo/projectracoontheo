<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">

    <meta name="viewport" content="width=device-width, initial-scale=1">

    <title>Raccoon Detection</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Custom CSS -->
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>


<body class="bg-light">

    <!-- Navbar -->
    <nav class="navbar navbar-dark bg-dark shadow">
        <div class="container">

            <span class="navbar-brand mb-0 h1">
                🦝 Raccoon Detection System by Tionida
            </span>


        </div>
    </nav>


    <div class="container mt-4">

        <div class="row">

            <!-- Camera -->
            <div class="col-lg-8">

                <div class="card shadow border-0">

                    <div class="card-header bg-success text-white">

                        <h5 class="mb-0">
                            Live Camera
                        </h5>

                    </div>

                    <div class="card-body text-center">
                        <img id="camera" class="img-fluid rounded shadow camera-frame">
                    </div>

                </div>

            </div>

            <!-- Information -->
            <div class="col-lg-4">

                <div class="card shadow border-0">

                    <div class="card-header bg-primary text-white">

                        <h5 class="mb-0">
                            Detection Information
                        </h5>

                    </div>

                    <div class="card-body">

                        <table class="table">

                            <tr>
                                <th>Status</th>
                                <td>
                                    <span class="badge bg-success">
                                        Camera Active
                                    </span>
                                </td>
                            </tr>

                            <tr>
                                <th>Model</th>
                                <td>YOLOv8</td>
                            </tr>

                            <tr>
                                <th>Object</th>
                                <td>Raccoon</td>
                            </tr>

                            <tr>

                                <th>Detected</th>

                                <td id="object">

                                    0

                                </td>

                            </tr>

                            <tr>

                            <tr>
                                <th>Confidence</th>
                                <td id="confidence">
                                    0%
                                </td>
                            </tr>

                            <tr>
                                <th>FPS</th>
                                <td id="fps">
                                    0
                                </td>
                            </tr>

                        </table>

                        <hr>

                        <div class="d-grid gap-2">

                            <button id="start" class="btn btn-success">

                                Start Camera

                            </button>

                            <button id="stop" class="btn btn-danger">

                                Stop Camera

                            </button>

                        </div>

                    </div>

                </div>

            </div>

        </div>

    </div>
    <script src="{{ url_for('static', filename='js/script.js') }}"></script>
</body>

</html>
