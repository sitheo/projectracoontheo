<!DOCTYPE html>
<html lang="en" data-bs-theme="dark">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Raccoon Detection</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        #camera-container {

            position: relative;

            width: 100%;

            max-width: 900px;

            margin: auto;

        }

        #video {

            width: 100%;

            display: block;

            border-radius: 10px;

        }

        #overlay {

            position: absolute;

            left: 0;

            top: 0;

            width: 100%;

            height: 100%;

            pointer-events: none;

        }

        .bg-custom-purple {
            background-color: #6f42c1 !important;
        }
    </style>

</head>

<body class="bg-dark">

    <div class="container mt-4">

        <div class="row ">

            <!-- Camera -->
            <div class="col-lg-8">

                <div class="card shadow ">

                    <div class="card-header bg-custom-purple text-white ">
                        Raccoon Live Camera Detection
                    </div>

                    <div class="card-body">

                        <div id="camera-container">

                            <video id="video" autoplay playsinline></video>

                            <canvas id="overlay"></canvas>

                        </div>

                    </div>

                </div>

            </div>

            <!-- Information -->
            <div class="col-lg-4 ">

                <div class="card shadow ">

                    <div class="card-header bg-custom-purple">
                        Detection Information
                    </div>

                    <div class="card-body">
                        <div class="list-group">

                            <div class="list-group-item ">

                                <small>Status</small>

                                <h5 id="status">Running</h5>

                            </div>

                            <div class="list-group-item">

                                <small>Detected</small>

                                <h5 id="detected">0</h5>

                            </div>

                            <div class="list-group-item">

                                <small>Confidence</small>

                                <h5 id="confidence">0%</h5>

                            </div>

                            <div class="list-group-item">

                                <small>FPS</small>

                                <h5 id="fps">0</h5>

                            </div>

                            <div class="list-group-item">

                                <small>Model</small>

                                <h5>YOLOv8</h5>

                            </div>

                        </div>
                        <div class=" d-grid gap-2 mt-4">

                            <button class="btn btn-success" onclick="startCamera()">

                                ▶ Start Camera

                            </button>

                            <button class="btn btn-danger" onclick="stopCamera()">

                                ■ Stop Camera

                            </button>

                        </div>
                        <hr class="my-4">


                    </div>


                </div>

            </div>
            <div class="card shadow text-center py-2 mt-4 mx-2">

                <small class="text-muted d-block">
                    Developed by
                </small>

                <strong class="text-success">
                    Tionida Valerie
                </strong>

                <div class="text-muted small">
                    © 2026 Raccoon Detection System
                </div>

            </div>

        </div>

    </div>

    <script src="{{ url_for('static', filename='js/app.js') }}"></script>

</body>

</html>
